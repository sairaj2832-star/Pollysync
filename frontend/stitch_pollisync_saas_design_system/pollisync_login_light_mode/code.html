<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PolliSync - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist+Sans:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#3c4a42",
                        "inverse-surface": "#342f2b",
                        "on-primary-container": "#00422b",
                        "on-secondary": "#ffffff",
                        "on-background": "#1f1b17",
                        "inverse-primary": "#4edea3",
                        "surface-container": "#f6ece6",
                        "tertiary-fixed": "#ffdad7",
                        "on-secondary-container": "#684000",
                        "on-tertiary": "#ffffff",
                        "surface": "#fff8f5",
                        "surface-container-low": "#fcf2eb",
                        "secondary": "#855300",
                        "tertiary": "#b91a24",
                        "on-tertiary-fixed-variant": "#930013",
                        "tertiary-fixed-dim": "#ffb3ad",
                        "surface-container-high": "#f0e6e0",
                        "secondary-container": "#fea619",
                        "primary-container": "#10b981",
                        "on-tertiary-fixed": "#410004",
                        "on-primary-fixed": "#002113",
                        "on-secondary-fixed-variant": "#653e00",
                        "outline": "#6c7a71",
                        "surface-container-highest": "#eae1da",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#6ffbbe",
                        "on-surface": "#1f1b17",
                        "surface-tint": "#006c49",
                        "on-tertiary-container": "#79000e",
                        "on-primary-fixed-variant": "#005236",
                        "tertiary-container": "#ff7a73",
                        "inverse-on-surface": "#f9efe8",
                        "surface-variant": "#eae1da",
                        "error": "#ba1a1a",
                        "on-primary": "#ffffff",
                        "surface-bright": "#fff8f5",
                        "background": "#fff8f5",
                        "surface-dim": "#e2d8d2",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#ffb95f",
                        "on-error": "#ffffff",
                        "primary": "#006c49",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed-dim": "#4edea3",
                        "outline-variant": "#bbcabf",
                        "on-secondary-fixed": "#2a1700",
                        "secondary-fixed": "#ffddb8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "16px",
                        "base": "4px",
                        "container-max": "1280px",
                        "xl": "32px",
                        "gutter": "24px",
                        "xs": "4px",
                        "sm": "8px",
                        "lg": "24px",
                        "2xl": "48px",
                        "3xl": "64px"
                    },
                    "fontFamily": {
                        "headline-md": ["Geist Sans"],
                        "headline-lg": ["Geist Sans"],
                        "display": ["Geist Sans"],
                        "label-md": ["Geist Sans"],
                        "headline-sm": ["Geist Sans"],
                        "body-sm": ["Inter"],
                        "headline-lg-mobile": ["Geist Sans"],
                        "body-lg": ["Inter"],
                        "label-sm": ["Geist Sans"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "display": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "letterSpacing": "0em", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "letterSpacing": "0em", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "400" }]
                    }
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 248, 245, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        
        .subtle-gradient-bg {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.05) 0%, rgba(254, 166, 25, 0.05) 100%), #fff8f5;
        }

        .input-ring-focus:focus-within {
            border-color: #10b981;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body class="subtle-gradient-bg min-h-screen flex flex-col justify-center items-center p-md sm:p-gutter">
<!-- Decorative background blobs -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<div class="absolute -top-40 -left-40 w-96 h-96 rounded-full bg-primary-container/20 blur-3xl opacity-50"></div>
<div class="absolute top-1/2 -right-40 w-[30rem] h-[30rem] rounded-full bg-secondary-container/20 blur-3xl opacity-30"></div>
</div>
<div class="w-full max-w-[420px] z-10">
<!-- Brand Logo/Header -->
<div class="text-center mb-xl">
<h1 class="font-display text-display text-primary flex items-center justify-center gap-sm">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">eco</span>
                PolliSync
            </h1>
</div>
<!-- Login Card -->
<div class="glass-panel rounded-xl p-lg sm:p-xl w-full">
<div class="mb-xl text-center">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-sm">Welcome back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to your farm dashboard</p>
</div>
<form class="space-y-md">
<!-- Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="email">Email Address</label>
<div class="relative flex items-center rounded-lg border border-outline-variant bg-surface input-ring-focus transition-shadow duration-200">
<span class="material-symbols-outlined absolute left-md text-on-surface-variant text-[20px]">mail</span>
<input class="w-full pl-[48px] pr-md py-sm bg-transparent border-none focus:ring-0 font-body-md text-body-md text-on-surface rounded-lg placeholder:text-on-surface-variant/50" id="email" name="email" placeholder="grower@farm.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-xs">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot?</a>
</div>
<div class="relative flex items-center rounded-lg border border-outline-variant bg-surface input-ring-focus transition-shadow duration-200">
<span class="material-symbols-outlined absolute left-md text-on-surface-variant text-[20px]">lock</span>
<input class="w-full pl-[48px] pr-[48px] py-sm bg-transparent border-none focus:ring-0 font-body-md text-body-md text-on-surface rounded-lg placeholder:text-on-surface-variant/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-md text-on-surface-variant hover:text-on-surface transition-colors flex items-center" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center mt-md mb-lg">
<input class="rounded border-outline-variant text-primary focus:ring-primary bg-surface w-4 h-4 cursor-pointer" id="remember" type="checkbox"/>
<label class="ml-sm font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember">Remember me for 30 days</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md py-[12px] rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all duration-150 flex items-center justify-center gap-sm" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-lg flex items-center">
<div class="flex-grow border-t border-outline-variant/50"></div>
<span class="flex-shrink-0 mx-md font-label-sm text-label-sm text-on-surface-variant">Or continue with</span>
<div class="flex-grow border-t border-outline-variant/50"></div>
</div>
<!-- Google OAuth -->
<button class="w-full bg-surface border border-outline-variant text-on-surface font-label-md text-label-md py-[12px] rounded-lg hover:bg-surface-container-low active:bg-surface-container transition-colors duration-150 flex items-center justify-center gap-sm" type="button">
<!-- Simple SVG for Google 'G' -->
<svg fill="none" height="18" viewbox="0 0 24 24" width="18" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Google
            </button>
</div>
<!-- Footer Links -->
<div class="mt-xl text-center space-y-md">
<p class="font-body-md text-body-md text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-label-md hover:underline hover:text-primary-fixed-dim transition-colors" href="#">Register</a>
</p>
<a class="inline-flex items-center gap-xs font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface transition-colors" href="#">
<span class="material-symbols-outlined text-[16px]">arrow_back</span>
                Back to home
            </a>
</div>
</div>
</body></html>
