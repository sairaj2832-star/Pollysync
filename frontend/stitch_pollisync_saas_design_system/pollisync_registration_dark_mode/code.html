<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register - PolliSync</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist+Sans:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#3c4a42",
                        "inverse-surface": "#342f2b",
                        "on-primary-container": "#00422b",
                        "on-secondary": "#ffffff",
                        "on-background": "#1f1b17",
                        "inverse-primary": "#4edea3",
                        "surface-container": "#f6ece6",
                        "tertiary-fixed": "#ffdad7",
                        "on-secondary-container": "#684000",
                        "on-tertiary": "#ffffff",
                        "surface": "#fff8f5",
                        "surface-container-low": "#fcf2eb",
                        "secondary": "#855300",
                        "tertiary": "#b91a24",
                        "on-tertiary-fixed-variant": "#930013",
                        "tertiary-fixed-dim": "#ffb3ad",
                        "surface-container-high": "#f0e6e0",
                        "secondary-container": "#fea619",
                        "primary-container": "#10b981",
                        "on-tertiary-fixed": "#410004",
                        "on-primary-fixed": "#002113",
                        "on-secondary-fixed-variant": "#653e00",
                        "outline": "#6c7a71",
                        "surface-container-highest": "#eae1da",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#6ffbbe",
                        "on-surface": "#1f1b17",
                        "surface-tint": "#006c49",
                        "on-tertiary-container": "#79000e",
                        "on-primary-fixed-variant": "#005236",
                        "tertiary-container": "#ff7a73",
                        "inverse-on-surface": "#f9efe8",
                        "surface-variant": "#eae1da",
                        "error": "#ba1a1a",
                        "on-primary": "#ffffff",
                        "surface-bright": "#fff8f5",
                        "background": "#fff8f5",
                        "surface-dim": "#e2d8d2",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#ffb95f",
                        "on-error": "#ffffff",
                        "primary": "#006c49",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed-dim": "#4edea3",
                        "outline-variant": "#bbcabf",
                        "on-secondary-fixed": "#2a1700",
                        "secondary-fixed": "#ffddb8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "16px",
                        "base": "4px",
                        "container-max": "1280px",
                        "xl": "32px",
                        "gutter": "24px",
                        "xs": "4px",
                        "sm": "8px",
                        "lg": "24px",
                        "2xl": "48px",
                        "3xl": "64px"
                    },
                    "fontFamily": {
                        "headline-md": ["Geist Sans"],
                        "headline-lg": ["Geist Sans"],
                        "display": ["Geist Sans"],
                        "label-md": ["Geist Sans"],
                        "headline-sm": ["Geist Sans"],
                        "body-sm": ["Inter"],
                        "headline-lg-mobile": ["Geist Sans"],

                        "label-sm": ["Geist Sans"],

                    },
                    "fontSize": {

                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "display": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "letterSpacing": "0em", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "letterSpacing": "0em", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-slate-900 { background-color: #0f172a; }
        .bg-slate-800 { background-color: #1e293b; }
        .border-slate-700 { border-color: #334155; }
        .text-emerald-500 { color: #10b981; }
        .bg-emerald-500 { background-color: #10b981; }
        .hover\:bg-emerald-600:hover { background-color: #059669; }
        .ring-emerald-500 { --tw-ring-color: #10b981; }
        
        /* Custom Input Styles */
        .input-field {
            @apply w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all font-body-md text-body-md;
        }
        .input-label {
            @apply block mb-sm font-label-md text-label-md text-slate-300;
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-md sm:p-lg md:p-xl font-body-md text-slate-200 antialiased selection:bg-emerald-500/30">
<div class="w-full max-w-[480px]">
<!-- Brand Logo -->
<div class="flex justify-center mb-xl">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-emerald-500 text-3xl" style="font-variation-settings: 'FILL' 1;">agriculture</span>
<span class="font-headline-md text-headline-md font-bold text-white tracking-tight">PolliSync</span>
</div>
</div>
<!-- Registration Card -->
<div class="bg-slate-800 rounded-xl border border-slate-700 shadow-2xl overflow-hidden backdrop-blur-sm">
<!-- Header -->
<div class="p-lg sm:p-xl border-b border-slate-700 text-center">
<h2 class="font-headline-sm text-headline-sm text-white mb-sm">Start Your Pollination Journey</h2>
<p class="font-body-sm text-body-sm text-slate-400">Join the premier agrotech analytics platform today.</p>
</div>
<!-- Content Container -->
<div class="p-lg sm:p-xl relative overflow-hidden" id="form-container">
<!-- Progress Indicator -->
<div class="flex items-center justify-between mb-xl relative z-10">
<div class="flex-1 flex items-center">
<div class="w-8 h-8 rounded-full bg-emerald-500 text-white flex items-center justify-center font-label-sm text-label-sm shadow-[0_0_10px_rgba(16,185,129,0.3)] transition-colors duration-300" id="step1-indicator">1</div>
<div class="h-1 flex-1 mx-sm bg-emerald-500/30 rounded-full overflow-hidden relative">
<div class="absolute top-0 left-0 h-full w-0 bg-emerald-500 transition-all duration-500 ease-in-out" id="progress-bar"></div>
</div>
</div>
<div class="w-8 h-8 rounded-full bg-slate-700 text-slate-400 flex items-center justify-center font-label-sm text-label-sm border border-slate-600 transition-all duration-300" id="step2-indicator">2</div>
</div>
<!-- Forms Wrapper (Sliding) -->
<div class="flex transition-transform duration-500 ease-[cubic-bezier(0.25,1,0.5,1)] w-[200%]" id="form-slider">
<!-- Step 1: Account Details -->
<div class="w-1/2 pr-lg sm:pr-xl shrink-0" id="step1-content">
<div class="space-y-md">
<div>
<label class="input-label" for="full-name">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">person</span>
<input class="input-field pl-10" id="full-name" placeholder="Jane Doe" type="text"/>
</div>
</div>
<div>
<label class="input-label" for="email">Work Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">mail</span>
<input class="input-field pl-10" id="email" placeholder="jane@farm.co" type="email"/>
</div>
</div>
<div>
<label class="input-label" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">lock</span>
<input class="input-field pl-10" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200 focus:outline-none">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<button class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-label-md text-label-md py-3 px-4 rounded-lg shadow-[inset_0_1px_0_rgba(255,255,255,0.2)] transition-all duration-200 mt-lg flex items-center justify-center gap-2 group" id="btn-next">
                                Continue to Farm Details
                                <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</div>
<!-- Step 2: Farm Details -->
<div class="w-1/2 pl-lg sm:pl-xl shrink-0 opacity-0 pointer-events-none transition-opacity duration-300" id="step2-content">
<div class="space-y-md">
<div>
<label class="input-label" for="farm-name">Farm Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">grass</span>
<input class="input-field pl-10" id="farm-name" placeholder="Sunrise Orchards" type="text"/>
</div>
</div>
<div class="grid grid-cols-2 gap-md">
<div>
<label class="input-label" for="region">Region</label>
<div class="relative">
<select class="input-field appearance-none cursor-pointer" id="region">
<option disabled="" selected="" value="">Select...</option>
<option value="na">North America</option>
<option value="sa">South America</option>
<option value="eu">Europe</option>
<option value="ap">Asia Pacific</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
</div>
</div>
<div>
<label class="input-label" for="acres">Total Acres</label>
<input class="input-field" id="acres" min="1" placeholder="500" type="number"/>
</div>
</div>
<div class="pt-sm pb-xs">
<label class="flex items-start gap-3 cursor-pointer group">
<div class="relative flex items-center justify-center mt-1">
<input class="peer appearance-none w-5 h-5 border border-slate-600 rounded bg-slate-900 checked:bg-emerald-500 checked:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 transition-all cursor-pointer" type="checkbox"/>
<span class="material-symbols-outlined absolute text-white text-[16px] opacity-0 peer-checked:opacity-100 pointer-events-none scale-50 peer-checked:scale-100 transition-all duration-200" style="font-variation-settings: 'wght' 700;">check</span>
</div>
<span class="font-body-sm text-body-sm text-slate-400 leading-snug group-hover:text-slate-300 transition-colors">
                                        I agree to the <a class="text-emerald-500 hover:underline" href="#">Terms of Service</a> and <a class="text-emerald-500 hover:underline" href="#">Privacy Policy</a>.
                                    </span>
</label>
</div>
<div class="flex gap-md mt-lg">
<button class="w-1/3 bg-slate-700 hover:bg-slate-600 text-white font-label-md text-label-md py-3 px-4 rounded-lg border border-slate-600 transition-all duration-200 flex items-center justify-center" id="btn-back">
                                    Back
                                </button>
<button class="w-2/3 bg-emerald-500 hover:bg-emerald-600 text-white font-label-md text-label-md py-3 px-4 rounded-lg shadow-[inset_0_1px_0_rgba(255,255,255,0.2)] transition-all duration-200 flex items-center justify-center gap-2" id="btn-submit">
                                    Create Account
                                    <span class="material-symbols-outlined text-[18px]">check_circle</span>
</button>
</div>
</div>
</div>
</div>
</div>
<!-- Footer -->
<div class="bg-slate-900/50 p-md border-t border-slate-700 text-center">
<p class="font-body-sm text-body-sm text-slate-400">
                    Already have an account? <a class="text-emerald-500 hover:text-emerald-400 font-label-md text-label-md hover:underline transition-colors" href="#">Sign In</a>
</p>
</div>
</div>
<div class="text-center mt-lg opacity-50">
<p class="font-label-sm text-label-sm text-slate-500">Secure AES-256 Encryption</p>
</div>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnNext = document.getElementById('btn-next');
            const btnBack = document.getElementById('btn-back');
            const formSlider = document.getElementById('form-slider');
            const step2Content = document.getElementById('step2-content');
            const step1Content = document.getElementById('step1-content');
            const progressBar = document.getElementById('progress-bar');
            const step2Indicator = document.getElementById('step2-indicator');

            // Slide to Step 2
            btnNext.addEventListener('click', (e) => {
                e.preventDefault();
                // Visual feedback
                btnNext.style.transform = 'scale(0.98)';
                setTimeout(() => btnNext.style.transform = 'scale(1)', 150);

                // Animation
                formSlider.style.transform = 'translateX(-50%)';
                step2Content.style.opacity = '1';
                step2Content.style.pointerEvents = 'auto';
                step1Content.style.opacity = '0';
                step1Content.style.pointerEvents = 'none';
                
                // Progress Update
                progressBar.style.width = '100%';
                step2Indicator.classList.remove('bg-slate-700', 'text-slate-400', 'border-slate-600');
                step2Indicator.classList.add('bg-emerald-500', 'text-white', 'border-transparent', 'shadow-[0_0_10px_rgba(16,185,129,0.3)]');
            });

            // Slide back to Step 1
            btnBack.addEventListener('click', (e) => {
                e.preventDefault();
                
                // Animation
                formSlider.style.transform = 'translateX(0)';
                step1Content.style.opacity = '1';
                step1Content.style.pointerEvents = 'auto';
                step2Content.style.opacity = '0';
                step2Content.style.pointerEvents = 'none';

                // Progress Update
                progressBar.style.width = '0%';
                step2Indicator.classList.add('bg-slate-700', 'text-slate-400', 'border-slate-600');
                step2Indicator.classList.remove('bg-emerald-500', 'text-white', 'border-transparent', 'shadow-[0_0_10px_rgba(16,185,129,0.3)]');
            });
        });
    </script>
</body></html>
