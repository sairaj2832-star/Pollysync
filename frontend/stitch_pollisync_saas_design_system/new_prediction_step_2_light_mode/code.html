        body { font-family: 'Inter', sans-serif; }

<body class="bg-surface text-on-surface h-screen w-full flex overflow-hidden">
<!-- Canvas (Main Content Area) -->
<main class="flex-1 h-full overflow-y-auto flex flex-col relative w-full items-center justify-center">
<!-- Back Button (Floating) -->
<div class="absolute top-md left-md">
<button class="flex items-center gap-sm px-md py-sm bg-surface-container hover:bg-surface-container-high transition-colors rounded-lg text-on-surface-variant font-label-md text-label-md">
<span class="material-symbols-outlined text-[20px]">arrow_back</span>
                Back to Crop Type
            </button>
</div>
<div class="w-full max-w-2xl px-gutter py-2xl flex flex-col items-center">
<!-- Header Section -->
<div class="text-center mb-xl w-full">
<span class="inline-block px-md py-xs bg-primary-container/10 text-primary font-label-sm text-label-sm rounded-full mb-md">Step 2 of 4</span>
<h1 class="font-headline-lg text-headline-lg md:font-display md:text-display text-on-surface mb-sm">Where is your farm located?</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-lg mx-auto">Select your district or use the map to pinpoint your farm's exact location for precise weather and pollination data.</p>
</div>
<!-- Main Interactive Area (Bento-style layout) -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg w-full">
<!-- Search & Dropdown (Left Column) -->
<div class="flex flex-col gap-md">
<label class="font-label-md text-label-md text-on-surface-variant">Search District</label>
<div class="relative w-full">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">search</span>
<input class="w-full pl-[48px] pr-md py-[12px] bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline-variant shadow-sm" placeholder="e.g. Pune, Maharashtra" type="text" value="Pune, Maharashtra"/>
</div>
<!-- Selected Location Details -->
<div class="mt-md p-md bg-surface-container-low rounded-xl border border-surface-variant shadow-[0_1px_3px_rgba(0,0,0,0.05)] flex flex-col gap-sm">
<div class="flex items-center gap-sm text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">location_on</span>
<span class="font-label-md text-label-md font-bold">Selected Location</span>
</div>
<div class="font-headline-sm text-headline-sm text-on-surface">Pune District</div>
<div class="font-body-sm text-body-sm text-on-surface-variant">Maharashtra, India</div>
<div class="flex items-center justify-between mt-sm pt-sm border-t border-outline-variant/30">
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-on-surface-variant">Latitude</span>
<span class="font-body-md text-body-md font-mono text-on-surface">18.5204° N</span>
</div>
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-on-surface-variant">Longitude</span>
<span class="font-body-md text-body-md font-mono text-on-surface">73.8567° E</span>
</div>
</div>
</div>
</div>
<!-- Map Thumbnail (Right Column) -->
<div class="flex flex-col gap-md h-full">
<label class="font-label-md text-label-md text-on-surface-variant opacity-0 hidden md:block">Map</label>
<div class="relative w-full h-[240px] md:h-full rounded-xl overflow-hidden border border-outline-variant shadow-sm group cursor-pointer bg-surface-container-lowest">
<!-- Placeholder Map Image -->
<div class="absolute inset-0 bg-cover bg-center transition-transform duration-500 group-hover:scale-105" data-alt="A clean, modern satellite map interface showing an agricultural region in India, likely Pune district. The map uses a sophisticated color palette of subtle greens and earthy tones, typical of a high-end data visualization SaaS platform. A prominent, stylized emerald green map pin marks a specific farm location. The overall aesthetic is minimal, bright, and professional." data-location="Pune, Maharashtra, India" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCWHffh5DrH2vVPqAL7W6hI_ZoheGgfcO2pqj0qmEHk_WkMhch4Oki6TcT9hYnk6qpCdmdF4wwrLJEuhDmM3X83bgfcSzdZN1ouCbYE4dwQ-t-qKbXSFCTRPkDn0Iv-H43oGazWGnzG5xNP03ptLVG1gpg9MipHVR_FCeKpm8f56hEXuFVvdwmJ4_BLAphQM5R-vsKaRT4ObO--rOiWiinkLEsjFivC68O00QtoIEmdxZpp9vJezGO2lxIrLy-XkBNGrSlM7Q26iI6G')"></div>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">my_location</span>
</div>
</div>
<!-- Map Action Button -->
<div class="absolute bottom-md left-1/2 -translate-x-1/2 w-[calc(100%-32px)]">
<button class="w-full py-sm bg-surface/90 backdrop-blur-sm border border-outline-variant text-on-surface font-label-md text-label-md rounded-lg flex items-center justify-center gap-sm hover:bg-surface transition-colors shadow-sm">
<span class="material-symbols-outlined text-[18px]">map</span>
                                Use Map Pin
                            </button>
</div>
</div>
</div>
</div>

<div class="w-full flex justify-end mt-2xl pt-xl border-t border-outline-variant/50">
<button class="px-xl py-[12px] bg-primary text-on-primary font-label-md text-label-md rounded-lg flex items-center gap-sm shadow-[inset_0_1px_0_rgba(255,255,255,0.2)] hover:brightness-110 active:scale-[0.98] transition-all">
                    Continue to Soil Data
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
