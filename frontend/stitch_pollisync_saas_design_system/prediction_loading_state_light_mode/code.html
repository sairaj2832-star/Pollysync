<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Prediction Loading - PolliSync</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-surface-variant": "#3c4a42",
                      "inverse-surface": "#342f2b",
                      "on-primary-container": "#00422b",
                      "on-secondary": "#ffffff",
                      "on-background": "#1f1b17",
                      "inverse-primary": "#4edea3",
                      "surface-container": "#f6ece6",
                      "tertiary-fixed": "#ffdad7",
                      "on-secondary-container": "#684000",
                      "on-tertiary": "#ffffff",
                      "surface": "#fff8f5",
                      "surface-container-low": "#fcf2eb",
                      "secondary": "#855300",
                      "tertiary": "#b91a24",
                      "on-tertiary-fixed-variant": "#930013",
                      "tertiary-fixed-dim": "#ffb3ad",
                      "surface-container-high": "#f0e6e0",
                      "secondary-container": "#fea619",
                      "primary-container": "#10b981",
                      "on-tertiary-fixed": "#410004",
                      "on-primary-fixed": "#002113",
                      "on-secondary-fixed-variant": "#653e00",
                      "outline": "#6c7a71",
                      "surface-container-highest": "#eae1da",
                      "error-container": "#ffdad6",
                      "primary-fixed": "#6ffbbe",
                      "on-surface": "#1f1b17",
                      "surface-tint": "#006c49",
                      "on-tertiary-container": "#79000e",
                      "on-primary-fixed-variant": "#005236",
                      "tertiary-container": "#ff7a73",
                      "inverse-on-surface": "#f9efe8",
                      "surface-variant": "#eae1da",
                      "error": "#ba1a1a",
                      "on-primary": "#ffffff",
                      "surface-bright": "#fff8f5",
                      "background": "#fff8f5",
                      "surface-dim": "#e2d8d2",
                      "on-error-container": "#93000a",
                      "secondary-fixed-dim": "#ffb95f",
                      "on-error": "#ffffff",
                      "primary": "#006c49",
                      "surface-container-lowest": "#ffffff",
                      "primary-fixed-dim": "#4edea3",
                      "outline-variant": "#bbcabf",
                      "on-secondary-fixed": "#2a1700",
                      "secondary-fixed": "#ffddb8"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "md": "16px",
                      "base": "4px",
                      "container-max": "1280px",
                      "xl": "32px",
                      "gutter": "24px",
                      "xs": "4px",
                      "sm": "8px",
                      "lg": "24px",
                      "2xl": "48px",
                      "3xl": "64px"
              },
              "fontFamily": {
                      "headline-md": ["Geist Sans"],
                      "headline-lg": ["Geist Sans"],
                      "display": ["Geist Sans"],
                      "label-md": ["Geist Sans"],
                      "headline-sm": ["Geist Sans"],
                      "body-sm": ["Inter"],
                      "headline-lg-mobile": ["Geist Sans"],
                      "body-lg": ["Inter"],
                      "label-sm": ["Geist Sans"],
                      "body-md": ["Inter"]
              },
              "fontSize": {
                      "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                      "display": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                      "headline-sm": ["20px", {"lineHeight": "28px", "letterSpacing": "0em", "fontWeight": "600"}],
                      "body-sm": ["14px", {"lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400"}],
                      "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "body-lg": ["18px", {"lineHeight": "28px", "letterSpacing": "0em", "fontWeight": "400"}],
                      "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                      "body-md": ["16px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "400"}]
              }
            }
          }
        }
    </script>
<style>
        .loading-ring {
            display: inline-block;
            width: 120px;
            height: 120px;
        }
        .loading-ring:after {
            content: " ";
            display: block;
            width: 100px;
            height: 100px;
            margin: 10px;
            border-radius: 50%;
            border: 6px solid #10b981; /* primary-container */
            border-color: #10b981 transparent #10b981 transparent;
            animation: loading-ring 1.2s linear infinite;
        }
        @keyframes loading-ring {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .fade-text {
            animation: fadeInOut 3s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; transform: translateY(5px); }
            10%, 90% { opacity: 1; transform: translateY(0); }
        }

        .progress-segment {
            animation: progressPulse 2s ease-in-out infinite alternate;
        }

        @keyframes progressPulse {
            0% { background-color: #f0e6e0; /* surface-container-high */ }
            100% { background-color: #10b981; /* primary-container */ }
        }
    </style>
</head>
<body class="bg-surface text-on-surface h-screen w-screen flex flex-col overflow-hidden selection:bg-primary-container/30">
<!-- Top Navigation (Suppressed for transactional loading state) -->
<!-- Main Content Canvas - Full Screen Loading Overlay -->
<main class="flex-grow flex flex-col items-center justify-center p-md md:p-xl h-full w-full relative z-10">
<!-- Background Pattern / Subtle Texture -->
<div class="absolute inset-0 z-0 opacity-5 bg-[radial-gradient(#6c7a71_1px,transparent_1px)] [background-size:16px_16px]"></div>
<div class="z-10 flex flex-col items-center max-w-lg w-full text-center space-y-2xl">
<!-- Brand Element -->
<div class="flex items-center space-x-sm mb-lg">
<span class="material-symbols-outlined text-primary-container text-[32px]">agriculture</span>
<span class="font-headline-lg text-headline-lg font-black text-primary">PolliSync</span>
</div>
<!-- Animated Spinner -->
<div class="relative flex items-center justify-center mb-xl">
<!-- Outer decorative ring -->
<div class="absolute w-[160px] h-[160px] rounded-full border border-surface-variant animate-[spin_4s_linear_infinite]"></div>
<!-- Core spinner -->
<div class="loading-ring"></div>
<!-- Center Icon -->
<div class="absolute inset-0 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[40px] animate-pulse" style="font-variation-settings: 'FILL' 1;">analytics</span>
</div>
</div>
<!-- Rotating Messages Container -->
<div class="h-16 flex items-center justify-center relative w-full overflow-hidden">
<h2 class="font-headline-sm text-headline-sm text-on-surface fade-text absolute w-full text-center" id="loading-message">
                    Initiating Prediction Matrix...
                </h2>
</div>
<!-- Segmented Progress Indicator (Indeterminate) -->
<div class="w-full flex space-x-sm h-sm rounded-full overflow-hidden">
<div class="flex-1 rounded-full progress-segment" style="animation-delay: 0s;"></div>
<div class="flex-1 rounded-full progress-segment" style="animation-delay: 0.2s;"></div>
<div class="flex-1 rounded-full progress-segment" style="animation-delay: 0.4s;"></div>
<div class="flex-1 rounded-full progress-segment" style="animation-delay: 0.6s;"></div>
<div class="flex-1 rounded-full progress-segment" style="animation-delay: 0.8s;"></div>
<div class="flex-1 rounded-full progress-segment" style="animation-delay: 1.0s;"></div>
</div>
<!-- Subtle secondary text -->
<p class="font-body-sm text-body-sm text-on-surface-variant mt-md">
                Compiling multi-variate environmental data.<br/>This may take a few moments.
            </p>
</div>
</main>
<script>
        const messages = [
            "Fetching localized weather models...",
            "Analyzing historical bee populations...",
            "Cross-referencing farm topographies...",
            "Calculating pollination probabilities...",
            "Generating yield forecasts...",
            "Applying machine learning models...",
            "Finalizing prediction matrix..."
        ];

        let currentIndex = 0;
        const messageElement = document.getElementById('loading-message');

        setInterval(() => {
            // Briefly fade out (handled by CSS animation timing mostly, but we sync text change)
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % messages.length;
                messageElement.textContent = messages[currentIndex];
            }, 500); // Change text in the middle of the fade-out cycle
        }, 3000); // 3 seconds matches the CSS animation duration
    </script>
</body></html>
