[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# These VITE_* vars are intentionally inlined into the JS bundle by Vite.
# Firebase config and the API URL are public client-side values — not secrets.
[context.production.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_API_URL,VITE_FIREBASE_API_KEY,VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET,VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_APP_ID"

# SPA routing — send all routes to index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
